# Nexo Co-Review production stack (GHCR images — no local source or build).
#
# Long-running services: api, worker, db, redis.
# Review agent containers are spawned on demand by the worker when a PR arrives.
#
# Deploy:
#   cp .env.example .env
#   docker compose -f docker-compose.yaml pull
#   docker compose -f docker-compose.yaml up -d
#
# Development merges docker-compose.override.yaml (HMR, local agent image build):
#   docker compose up --build
#
# Resource limits target EC2 t2.medium (2 vCPU, 4 GiB RAM): one review at a time
# (worker --concurrency 1) plus a capped agent container (~768 MiB).

networks:
  coreview:
    name: coreview

x-coreview-image: &coreview-image
  image: ${NEXO_COREVIEW_IMAGE:-ghcr.io/nexo-agent/nexo-coreview:latest}
  pull_policy: missing

x-db-resources: &db-resources
  deploy:
    resources:
      limits:
        cpus: "0.25"
        memory: 256M
      reservations:
        memory: 64M

x-redis-resources: &redis-resources
  deploy:
    resources:
      limits:
        cpus: "0.10"
        memory: 96M
      reservations:
        memory: 32M

services:
  api:
    <<: *coreview-image
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable
      NEXO_COREVIEW_CELERY_BROKER_URL: redis://redis:6379/0
      NEXO_COREVIEW_AGENT_CALLBACK_URL: http://api:8000/api/v1/agent/review-events
      NEXO_COREVIEW_AGENT_CALLBACK_SECRET: ${NEXO_COREVIEW_AGENT_CALLBACK_SECRET:-dev-callback-secret}
      DB_POOL_MIN_SIZE: 1
      DB_POOL_MAX_SIZE: 4
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
        reservations:
          memory: 128M
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    <<: *coreview-image
    command: ["code-review", "job", "worker", "--concurrency", "1"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable
      NEXO_COREVIEW_CELERY_BROKER_URL: redis://redis:6379/0
      NEXO_COREVIEW_WORKSPACE_ROOT: /workspaces
      NEXO_COREVIEW_DOCKER_HOST: unix:///var/run/docker.sock
      NEXO_COREVIEW_AGENT_IMAGE: ${NEXO_COREVIEW_AGENT_IMAGE:-ghcr.io/nexo-agent/nexo-coreview-agent:latest}
      NEXO_COREVIEW_AGENT_NETWORK: coreview
      NEXO_COREVIEW_AGENT_MEM_LIMIT: ${NEXO_COREVIEW_AGENT_MEM_LIMIT:-768m}
      NEXO_COREVIEW_AGENT_CPUS: ${NEXO_COREVIEW_AGENT_CPUS:-1.0}
      NEXO_COREVIEW_AGENT_CALLBACK_URL: http://api:8000/api/v1/agent/review-events
      NEXO_COREVIEW_AGENT_CALLBACK_SECRET: ${NEXO_COREVIEW_AGENT_CALLBACK_SECRET:-dev-callback-secret}
      DB_POOL_MIN_SIZE: 1
      DB_POOL_MAX_SIZE: 4
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 320M
        reservations:
          memory: 96M
    volumes:
      - review_workspaces:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    <<: *redis-resources
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - coreview
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    <<: *db-resources
    command: postgres -c shared_buffers=64MB -c max_connections=30
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coreview
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- One-shot init (not part of the runtime stack) ---

  migrations-export:
    <<: *coreview-image
    user: "0:0"
    restart: "no"
    volumes:
      - migrations_data:/migrations
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp -r /app/migrations/. /migrations/"]

  migrate:
    image: ghcr.io/amacneil/dbmate:2
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable
    volumes:
      - migrations_data:/db/migrations
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
      migrations-export:
        condition: service_completed_successfully
    command: ["-d", "/db/migrations", "--wait", "up"]

  migrate-down:
    profiles: [tools]
    image: ghcr.io/amacneil/dbmate:2
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable
    volumes:
      - migrations_data:/db/migrations
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
      migrations-export:
        condition: service_completed_successfully
    command: ["-d", "/db/migrations", "down"]

volumes:
  postgres_data:
  review_workspaces:
  migrations_data:
