# Base stack: Postgres + production app (profile: prod) + migrations (profile: tools)
#
# Local dev: docker-compose.override.yaml is merged automatically on
#   docker compose up / watch
# Production: explicit -f skips the override file
#   docker compose -f docker-compose.yaml --profile prod up -d

networks:
  coreview:
    name: coreview

services:
  app:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable
      NEXO_COREVIEW_CELERY_BROKER_URL: redis://redis:6379/0
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
    command: ["code-review", "job", "worker"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable
      NEXO_COREVIEW_CELERY_BROKER_URL: redis://redis:6379/0
      NEXO_COREVIEW_GITHUB_TOKEN: ${NEXO_COREVIEW_GITHUB_TOKEN:-}
      NEXO_COREVIEW_GITHUB_WEBHOOK_SECRET: ${NEXO_COREVIEW_GITHUB_WEBHOOK_SECRET:-}
      NEXO_COREVIEW_WORKSPACE_ROOT: /workspaces
      NEXO_COREVIEW_DOCKER_HOST: unix:///var/run/docker.sock
      NEXO_COREVIEW_AGENT_IMAGE: ${NEXO_COREVIEW_AGENT_IMAGE:-nexo-coreview-agent:dev}
      NEXO_COREVIEW_AGENT_NETWORK: coreview
      NEXO_COREVIEW_OPENCODE_CONFIG_PATH: /config/opencode.generated.json
      NEXO_COREVIEW_OPENCODE_SERVER_PASSWORD: ${NEXO_COREVIEW_OPENCODE_SERVER_PASSWORD:-}
    volumes:
      - review_workspaces:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
      - ./opencode.generated.json:/config/opencode.generated.json:ro
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - coreview
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coreview
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    profiles: [tools]
    image: ghcr.io/amacneil/dbmate:2
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable
    volumes:
      - ./backend/migrations:/db/migrations
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
    command: ["-d", "/db/migrations", "--wait", "up"]

volumes:
  postgres_data:
  review_workspaces:
