# Local "prod-like" reference for understanding the deployment topology.
# Not a production-ready manifest.
# Before using this as a production base, review image pinning, secrets,
# port exposure, persistent storage, resource sizing, and Docker socket access.

networks:
  coreview:
    name: coreview

x-coreview-image: &coreview-image
  image: ${COGITO_REVIEW_IMAGE:-ghcr.io/cogitoforge-ai/cogito-review:latest}
  pull_policy: always

x-api-environment: &api-environment
  DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable
  COGITO_REVIEW_CELERY_BROKER_URL: redis://redis:6379/0
  COGITO_REVIEW_AGENT_CALLBACK_URL: http://api:8000/api/v1/agent/review-events
  COGITO_REVIEW_AGENT_CALLBACK_SECRET: ${COGITO_REVIEW_AGENT_CALLBACK_SECRET:-dev-callback-secret}
  DB_POOL_MIN_SIZE: 1
  DB_POOL_MAX_SIZE: 4

x-db-resources: &db-resources
  deploy:
    resources:
      limits:
        cpus: "0.25"
        memory: 256M
      reservations:
        memory: 64M

x-redis-resources: &redis-resources
  deploy:
    resources:
      limits:
        cpus: "0.10"
        memory: 96M
      reservations:
        memory: 32M

services:
  api:
    <<: *coreview-image
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      <<: *api-environment
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
        reservations:
          memory: 128M
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    <<: *coreview-image
    command: ["cogito-review", "job", "worker", "--concurrency", "1"]
    environment:
      <<: *api-environment
      COGITO_REVIEW_WORKSPACE_ROOT: /workspaces
      COGITO_REVIEW_DOCKER_HOST: unix:///var/run/docker.sock
      COGITO_REVIEW_AGENT_IMAGE: ${COGITO_REVIEW_AGENT_IMAGE:-ghcr.io/cogitoforge-ai/cogito-review-agent:latest}
      COGITO_REVIEW_AGENT_NETWORK: coreview
      COGITO_REVIEW_AGENT_MEM_LIMIT: ${COGITO_REVIEW_AGENT_MEM_LIMIT:-1g}
      COGITO_REVIEW_AGENT_CPUS: ${COGITO_REVIEW_AGENT_CPUS:-1.0}
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 320M
        reservations:
          memory: 96M
    volumes:
      - review_workspaces:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    <<: *redis-resources
    networks:
      - coreview
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    <<: *db-resources
    command: postgres -c shared_buffers=64MB -c max_connections=30
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coreview
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    <<: *coreview-image
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["dbmate"]
    command: ["-d", "/app/migrations", "--wait", "up"]

  migrate-down:
    profiles: [tools]
    <<: *coreview-image
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["dbmate"]
    command: ["-d", "/app/migrations", "down"]

volumes:
  postgres_data:
  review_workspaces:
