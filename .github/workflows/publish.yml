name: Publish

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build & push ${{ matrix.image }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          startsWith(github.event.workflow_run.head_branch, 'v')
        )
      )
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: nexo-coreview
            file: Dockerfile
          - image: nexo-coreview-agent
            file: agent/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Lowercase repository owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: tags
        shell: bash
        run: |
          owner="${{ steps.owner.outputs.name }}"
          image="${{ matrix.image }}"
          ref="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          short_sha="${sha:0:7}"

          tags=(
            "${{ env.REGISTRY }}/${owner}/${image}:sha-${short_sha}"
          )

          if [[ "${ref}" == "main" ]]; then
            tags+=("${{ env.REGISTRY }}/${owner}/${image}:latest")
          elif [[ "${ref}" == v* ]]; then
            tags+=("${{ env.REGISTRY }}/${owner}/${image}:${ref}")
            tags+=("${{ env.REGISTRY }}/${owner}/${image}:${ref#v}")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [[ "${ref}" == v* ]]; then
            echo "version=${ref}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
          build-args: |
            VERSION=${{ steps.tags.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
