name: CI

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.21"

jobs:
  shared:
    name: Shared lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Ruff check
        run: uv run ruff check . && uv run ruff format --check .

      - name: Unit tests
        run: uv run pytest

  backend:
    name: Backend lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Ruff check
        run: uv run ruff check . && uv run ruff format --check .

      - name: Unit tests
        run: uv run pytest -m "not integration"

  agent:
    name: Agent lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Ruff check
        run: uv run ruff check . && uv run ruff format --check .

      - name: Unit tests
        run: uv run pytest

  frontend:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: corepack enable yarn && yarn install --frozen-lockfile

      - name: ESLint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

  integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    needs: [backend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/app?sslmode=disable
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Run migrations
        run: |
          docker run --rm \
            -e DATABASE_URL="${DATABASE_URL}" \
            -v "${{ github.workspace }}/backend/migrations:/db/migrations" \
            --network host \
            ghcr.io/amacneil/dbmate:2 \
            -d /db/migrations --wait up

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Integration tests
        run: uv run pytest -m integration

  docker-build:
    name: Docker build (verify)
    runs-on: ubuntu-latest
    needs: [shared, backend, agent, frontend, integration]
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: nexo-coreview
            file: Dockerfile
          - name: nexo-coreview-agent
            file: agent/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: ${{ matrix.name }}:ci
          build-args: |
            VERSION=ci
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Smoke test image entrypoints
        run: |
          if [ "${{ matrix.name }}" = "nexo-coreview" ]; then
            docker run --rm ${{ matrix.name }}:ci uvicorn --version
            docker run --rm ${{ matrix.name }}:ci code-review --help
          else
            docker run --rm ${{ matrix.name }}:ci coreview-agent --help
          fi
