---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-platform-cogito-review-v1alpha1-cogitoreviewrun
  failurePolicy: Fail
  name: vcogitoreviewrun.kb.io
  rules:
  - apiGroups:
    - platform.cogito.review
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - cogitoreviewruns
  sideEffects: None
