apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    app.kubernetes.io/name: cogito-review-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cogito-review-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cogito-review-operator
    spec:
      serviceAccountName: controller-manager
      containers:
      - name: manager
        image: controller:latest
        command: ["/manager"]
        args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
