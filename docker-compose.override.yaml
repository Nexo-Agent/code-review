services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    pull_policy: never

  migrate-down:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    pull_policy: never

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: python-builder
    pull_policy: never
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      CORS_ORIGINS: '["http://localhost:5173"]'
    volumes:
      - backend_venv:/app/.venv
      - review_workspaces:/workspaces
    working_dir: /workspace/backend
    command:
      - sh
      - -c
      - |
        uv sync --locked --all-groups
        exec uv run python -m uvicorn app.main:app \
          --reload \
          --reload-dir app \
          --reload-dir /workspace/shared/coreview_shared \
          --host 0.0.0.0 \
          --port 8000
    networks:
      - cogito-review
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./uv.lock
        - action: sync+restart
          path: ./pyproject.toml
          target: /workspace/pyproject.toml
        - action: sync+restart
          path: ./backend/pyproject.toml
          target: /workspace/backend/pyproject.toml
        - action: sync
          path: ./backend/app
          target: /workspace/backend/app
          ignore:
            - "**/__pycache__/"
            - "**/*.pyc"
        - action: sync
          path: ./shared/coreview_shared
          target: /workspace/shared/coreview_shared
          ignore:
            - "**/__pycache__/"
            - "**/*.pyc"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-builder
    pull_policy: never
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-false}
    volumes:
      - frontend_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - |
        if [ -f package-lock.json ]; then
          npm ci --no-audit --no-fund
          exec npm run dev -- --host 0.0.0.0 --port 5173
        elif [ -f yarn.lock ]; then
          corepack enable yarn
          yarn install --frozen-lockfile
          exec yarn dev --host 0.0.0.0 --port 5173
        elif [ -f pnpm-lock.yaml ]; then
          corepack enable pnpm
          pnpm install --frozen-lockfile
          exec pnpm dev --host 0.0.0.0 --port 5173
        else
          echo "No lockfile found."
          exit 1
        fi
    depends_on:
      api:
        condition: service_started
    networks:
      - cogito-review
    develop:
      watch:
        - action: rebuild
          path: ./frontend/yarn.lock
        - action: sync+restart
          path: ./frontend/package.json
          target: /app/package.json
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: sync
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts
        - action: sync
          path: ./frontend/tsconfig.json
          target: /app/tsconfig.json
        - action: sync
          path: ./frontend/tsconfig.app.json
          target: /app/tsconfig.app.json

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: python-builder
    pull_policy: never
    command:
      - sh
      - -c
      - |
        uv sync --locked --all-groups
        exec uv run cogito-review job worker
    environment:
      COGITO_REVIEW_WORKSPACE_ROOT: /workspaces
      COGITO_REVIEW_DOCKER_HOST: unix:///var/run/docker.sock
      COGITO_REVIEW_AGENT_IMAGE: ${COGITO_REVIEW_AGENT_IMAGE:-cogito-review-agent:dev}
      COGITO_REVIEW_AGENT_NETWORK: cogito-review
      COGITO_REVIEW_OPENCODE_LOG_LEVEL: ${COGITO_REVIEW_OPENCODE_LOG_LEVEL:-INFO}
    volumes:
      - backend_venv:/app/.venv
      - review_workspaces:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace/backend
    networks:
      - cogito-review
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started
    develop:
      watch:
        - action: rebuild
          path: ./uv.lock
        - action: sync+restart
          path: ./pyproject.toml
          target: /workspace/pyproject.toml
        - action: sync+restart
          path: ./backend/pyproject.toml
          target: /workspace/backend/pyproject.toml
        - action: sync+restart
          path: ./backend/app
          target: /workspace/backend/app
          ignore:
            - "**/__pycache__/"
            - "**/*.pyc"
        - action: sync+restart
          path: ./shared/coreview_shared
          target: /workspace/shared/coreview_shared
          ignore:
            - "**/__pycache__/"
            - "**/*.pyc"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  db:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

volumes:
  backend_venv:
  frontend_node_modules:
  review_workspaces:
