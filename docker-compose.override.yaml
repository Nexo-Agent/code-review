services:
  migrate:
    build:
      context: .
      dockerfile: dev.Dockerfile
      target: api
    volumes: !override
      - ./backend/migrations:/app/migrations:ro

  migrate-down:
    build:
      context: .
      dockerfile: dev.Dockerfile
      target: api
    volumes: !override
      - ./backend/migrations:/app/migrations:ro

  api:
    build:
      context: .
      dockerfile: dev.Dockerfile
      target: api
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      CORS_ORIGINS: '["http://localhost:5173"]'
    volumes:
      - ./backend:/workspace/backend
      - ./shared:/workspace/shared
      - ./pyproject.toml:/workspace/pyproject.toml
      - ./uv.lock:/workspace/uv.lock
      - backend_venv:/workspace/.venv
      - review_workspaces:/workspaces
    working_dir: /workspace/backend
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./uv.lock
        - action: sync+restart
          path: ./pyproject.toml
          target: /workspace/pyproject.toml
        - action: sync+restart
          path: ./backend/pyproject.toml
          target: /workspace/backend/pyproject.toml
        - action: sync
          path: ./backend/app
          target: /workspace/backend/app
          ignore:
            - "**/__pycache__/"
            - "**/*.pyc"
        - action: sync
          path: ./shared/coreview_shared
          target: /workspace/shared/coreview_shared
          ignore:
            - "**/__pycache__/"
            - "**/*.pyc"

  web:
    build:
      context: .
      dockerfile: dev.Dockerfile
      target: web
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-false}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started
    networks:
      - coreview
    develop:
      watch:
        - action: rebuild
          path: ./frontend/yarn.lock
        - action: sync+restart
          path: ./frontend/package.json
          target: /app/package.json
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: sync
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts
        - action: sync
          path: ./frontend/tsconfig.json
          target: /app/tsconfig.json
        - action: sync
          path: ./frontend/tsconfig.app.json
          target: /app/tsconfig.app.json

  worker:
    build:
      context: .
      dockerfile: dev.Dockerfile
      target: api
    command: ["uv", "run", "code-review", "job", "worker"]
    environment:
      NEXO_COREVIEW_WORKSPACE_ROOT: /workspaces
      NEXO_COREVIEW_DOCKER_HOST: unix:///var/run/docker.sock
      NEXO_COREVIEW_AGENT_IMAGE: ${NEXO_COREVIEW_AGENT_IMAGE:-code-review-agent:dev}
      NEXO_COREVIEW_AGENT_NETWORK: coreview
      NEXO_COREVIEW_OPENCODE_LOG_LEVEL: ${NEXO_COREVIEW_OPENCODE_LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/workspace/backend
      - ./shared:/workspace/shared
      - ./pyproject.toml:/workspace/pyproject.toml
      - ./uv.lock:/workspace/uv.lock
      - backend_venv:/workspace/.venv
      - review_workspaces:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace/backend
    networks:
      - coreview
    depends_on: !reset
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started

volumes:
  backend_venv:
  frontend_node_modules:
  review_workspaces:
