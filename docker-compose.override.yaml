# Development override — merged automatically with docker-compose.yaml
#
#   docker compose up --build   # db + init + api + web + worker
#   docker compose watch        # + Compose Watch (HMR / uvicorn reload)
#
# Not loaded when deploying production:
#   docker compose -f docker-compose.yaml --profile prod up -d

services:
  api:
    build:
      context: .
      dockerfile: dev.Dockerfile
      target: api
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable
      CORS_ORIGINS: '["http://localhost:5173"]'
      NEXO_COREVIEW_CELERY_BROKER_URL: redis://redis:6379/0
      NEXO_COREVIEW_OPENCODE_CONFIG_PATH: /config/opencode.generated.json
      NEXO_COREVIEW_OPENCODE_CONFIG_HOST_PATH: ${NEXO_COREVIEW_PROJECT_DIR}/opencode.generated.json
      NEXO_COREVIEW_AGENT_CALLBACK_URL: http://api:8000/api/v1/agent/review-events
      NEXO_COREVIEW_AGENT_CALLBACK_SECRET: ${NEXO_COREVIEW_AGENT_CALLBACK_SECRET:-dev-callback-secret}
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - review_workspaces:/workspaces
      - ./opencode.generated.json:/config/opencode.generated.json
    networks:
      - coreview
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      render-opencode:
        condition: service_completed_successfully
      agent-image:
        condition: service_completed_successfully
    develop:
      watch:
        - action: rebuild
          path: ./backend/uv.lock
        - action: sync+restart
          path: ./backend/pyproject.toml
          target: /app/pyproject.toml
        - action: sync
          path: ./backend/app
          target: /app/app
          ignore:
            - "**/__pycache__/"
            - "**/*.pyc"

  web:
    build:
      context: .
      dockerfile: dev.Dockerfile
      target: web
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-false}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started
    networks:
      - coreview
    develop:
      watch:
        - action: rebuild
          path: ./frontend/yarn.lock
        - action: sync+restart
          path: ./frontend/package.json
          target: /app/package.json
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: sync
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts
        - action: sync
          path: ./frontend/tsconfig.json
          target: /app/tsconfig.json
        - action: sync
          path: ./frontend/tsconfig.app.json
          target: /app/tsconfig.app.json

  worker:
    profiles: !reset []
    build:
      context: .
      dockerfile: dev.Dockerfile
      target: api
    command: ["uv", "run", "code-review", "job", "worker"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}?sslmode=disable
      NEXO_COREVIEW_CELERY_BROKER_URL: redis://redis:6379/0
      NEXO_COREVIEW_WORKSPACE_ROOT: /workspaces
      NEXO_COREVIEW_DOCKER_HOST: unix:///var/run/docker.sock
      NEXO_COREVIEW_AGENT_IMAGE: ${NEXO_COREVIEW_AGENT_IMAGE:-nexo-coreview-agent:dev}
      NEXO_COREVIEW_AGENT_NETWORK: coreview
      NEXO_COREVIEW_OPENCODE_LOG_LEVEL: ${NEXO_COREVIEW_OPENCODE_LOG_LEVEL:-INFO}
      NEXO_COREVIEW_OPENCODE_SERVER_PASSWORD: ${NEXO_COREVIEW_OPENCODE_SERVER_PASSWORD:-}
      NEXO_COREVIEW_AGENT_CALLBACK_URL: http://api:8000/api/v1/agent/review-events
      NEXO_COREVIEW_AGENT_CALLBACK_SECRET: ${NEXO_COREVIEW_AGENT_CALLBACK_SECRET:-dev-callback-secret}
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - review_workspaces:/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - coreview
    depends_on: !reset
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      agent-image:
        condition: service_completed_successfully
      api:
        condition: service_started

  render-opencode:
    build:
      context: .
      dockerfile: dev.Dockerfile
      target: api
    user: "0:0"
    command:
      [
        "uv",
        "run",
        "code-review",
        "config",
        "render-opencode",
        "-o",
        "/config/opencode.generated.json",
      ]

volumes:
  backend_venv:
  frontend_node_modules:
  review_workspaces:
