global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: cogito-review
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:9090
          - worker:9090
        labels:
          stack: cogito-review

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121
