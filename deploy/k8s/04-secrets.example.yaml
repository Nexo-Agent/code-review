# Copy to secrets.yaml and replace placeholder values before applying.
#   cp deploy/k8s/04-secrets.example.yaml deploy/k8s/secrets.yaml
#
# Do not commit secrets.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: review-db
  namespace: cogito-review
type: Opaque
stringData:
  DATABASE_URL: postgresql://app:app@postgres.example.com:5432/app?sslmode=disable
---
apiVersion: v1
kind: Secret
metadata:
  name: review-redis
  namespace: cogito-review
type: Opaque
stringData:
  REDIS_URL: redis://redis.example.com:6379/0
---
apiVersion: v1
kind: Secret
metadata:
  name: review-callback
  namespace: cogito-review
type: Opaque
stringData:
  secret: change-me-callback-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: review-session
  namespace: cogito-review
type: Opaque
stringData:
  secret: change-me-session-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: review-encryption
  namespace: cogito-review
type: Opaque
stringData:
  key: change-me-encryption-key-32chars-min
