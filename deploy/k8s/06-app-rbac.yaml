apiVersion: v1
kind: ServiceAccount
metadata:
  name: cogito-review-api
  namespace: cogito-review
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cogito-review-worker
  namespace: cogito-review
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cogito-review-agent
  namespace: cogito-review
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cogito-review-worker
  namespace: cogito-review
rules:
- apiGroups: [platform.cogito.review]
  resources: [cogitoreviewruns]
  verbs: [create, get, patch, list, watch]
- apiGroups: [""]
  resources: [secrets]
  verbs: [create, get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cogito-review-worker
  namespace: cogito-review
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cogito-review-worker
subjects:
- kind: ServiceAccount
  name: cogito-review-worker
  namespace: cogito-review
