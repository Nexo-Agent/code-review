apiVersion: v1
kind: ConfigMap
metadata:
  name: cogito-review-config
  namespace: cogito-review
data:
  COGITO_REVIEW_RUNTIME_PROVIDER: k8s
  COGITO_REVIEW_K8S_RUN_NAMESPACE: cogito-review
  COGITO_REVIEW_K8S_INSTALLATION_REF: main
  COGITO_REVIEW_K8S_RUNTIME_POLICY_REF: default
  COGITO_REVIEW_K8S_SCALING_POLICY_REF: default
  COGITO_REVIEW_WORKSPACE_ROOT: /workspaces
  COGITO_REVIEW_AGENT_IMAGE: ghcr.io/cogitoforge-ai/cogito-review-agent:latest
  COGITO_REVIEW_AGENT_CALLBACK_URL: http://cogito-review-api.cogito-review.svc:8000/api/v1/agent/review-events
