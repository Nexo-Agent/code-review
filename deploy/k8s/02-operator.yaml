apiVersion: v1
kind: ServiceAccount
metadata:
  name: cogito-review-operator
  namespace: cogito-review-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cogito-review-operator
rules:
- apiGroups: [""]
  resources: [pods, secrets]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [services]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [apps]
  resources: [deployments]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [batch]
  resources: [jobs]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [networking.k8s.io]
  resources: [ingresses]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [platform.cogito.review]
  resources:
  - cogitoreviewinstallations
  - cogitoreviewruns
  - cogitoreviewruntimepolicies
  - cogitoreviewscalingpolicies
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [platform.cogito.review]
  resources:
  - cogitoreviewinstallations/finalizers
  - cogitoreviewruns/finalizers
  verbs: [update]
- apiGroups: [platform.cogito.review]
  resources:
  - cogitoreviewinstallations/status
  - cogitoreviewruns/status
  - cogitoreviewruntimepolicies/status
  - cogitoreviewscalingpolicies/status
  verbs: [get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cogito-review-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cogito-review-operator
subjects:
- kind: ServiceAccount
  name: cogito-review-operator
  namespace: cogito-review-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cogito-review-operator-leader-election
  namespace: cogito-review-system
rules:
- apiGroups: [""]
  resources: [configmaps]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cogito-review-operator-leader-election
  namespace: cogito-review-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cogito-review-operator-leader-election
subjects:
- kind: ServiceAccount
  name: cogito-review-operator
  namespace: cogito-review-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cogito-review-operator
  namespace: cogito-review-system
  labels:
    app.kubernetes.io/name: cogito-review-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cogito-review-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cogito-review-operator
    spec:
      serviceAccountName: cogito-review-operator
      containers:
      - name: manager
        image: ghcr.io/cogitoforge-ai/cogito-review-operator:latest
        imagePullPolicy: IfNotPresent
        command: ["/manager"]
        args:
        - --leader-elect
        - --metrics-bind-address=:8080
        - --metrics-secure=false
        - --health-probe-bind-address=:8081
        ports:
        - containerPort: 8080
          name: metrics
        - containerPort: 9443
          name: webhook-server
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: cogito-review-operator-metrics
  namespace: cogito-review-system
  labels:
    app.kubernetes.io/name: cogito-review-operator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cogito-review-operator
  ports:
  - name: metrics
    port: 8080
    targetPort: metrics
